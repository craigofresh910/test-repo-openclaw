<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Office</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Agent Office</h1>
        <p class="subtitle">Live floor plan view of your team</p>
      </div>
      <div class="status">
        <span id="updatedAt">Last update: --</span>
      </div>
    </header>

    <main class="office">
      <div class="floor-column">
        <section class="floor" id="floor">
          <canvas id="scene"></canvas>
        </section>
        <section class="panel cap-panel">
          <details class="cap-collapse">
            <summary>Agent Capabilities</summary>
            <div id="capabilities"></div>
          </details>
        </section>
      </div>
      <aside class="panel" id="panel">
        <section class="dispatch">
          <h2>Dispatch</h2>
          <label>
            Target
            <select id="dispatchTarget"></select>
          </label>
          <label>
            Fan-out (comma-separated agent ids)
            <input id="dispatchFanout" type="text" placeholder="builder,qa" />
          </label>
          <label>
            Message
            <textarea id="dispatchText" rows="4" placeholder="What do you need?"></textarea>
          </label>
          <label class="inline">
            <input id="dispatchReturn" type="checkbox" checked />
            Return to desk when complete
          </label>
          <button id="dispatchSend">Send</button>
          <button id="dispatchReport" class="secondary">Generate Report</button>
          <pre id="dispatchOutput"></pre>
        </section>

        <details class="feed-collapse" open>
          <summary>Agent Feed</summary>
          <div id="feed"></div>
        </details>
      </aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
