<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Office</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Agent Office</h1>
        <p class="subtitle">Live floor plan view of your team</p>
      </div>
      <div class="status">
        <span id="updatedAt">Last update: --</span>
      </div>
    </header>

    <main class="office">
      <div class="floor-column">
        <section class="floor" id="floor">
          <canvas id="scene"></canvas>
        </section>
        <section class="panel cap-panel">
          <details class="cap-collapse" open>
            <summary>Agent Capabilities</summary>
            <div id="capabilities"></div>
          </details>
        </section>
      </div>
      <aside class="panel" id="panel">
        <details class="feed-collapse" open>
          <summary>Agent Feed</summary>
          <div id="feed"></div>
        </details>
      </aside>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
