<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 1024 256">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="256" fill="#0b0f17"/>
  <text x="512" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="700" fill="#f8fbff" filter="url(#glow)">Ducks is a row!</text>
  <text x="512" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="700" fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.9">Ducks is a row!</text>
</svg>
